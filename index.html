<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công Dọn Dẹp Phòng</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel compiler CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase App, Auth, and Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 text-neutral-800 dark:text-neutral-200 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Trash: ({ size = 20, className = "" }) => (
                <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            ),
            Sparkles: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            ),
            ChefHat: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v14"/><path d="M18 18H6a4 4 0 0 0 0 8h12a4 4 0 0 0 0-8Z"/></svg>
            ),
            Plus: ({ size = 20 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            ),
            PlusCircle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
            ),
            Gift: ({ size = 16 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5H7.5Z"/></svg>
            ),
            History: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            ),
            Clock: ({ size = 20, className = "" }) => (
                <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            Cloud: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.89-1.74-3.5-3.5-4.5-1.57-.9-3.7-.9-5.27 0C5.48 7.5 4.16 9.11 3.74 11c-2.46 0-5 1.71-5 4.5A3.5 3.5 0 0 0 2.2 19h15.3Z"/></svg>
            ),
            CloudOff: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 18h4a4 4 0 0 0 3.407-1.902"/><path d="M21.617 16.242A3.5 3.5 0 0 0 19.5 11h-.75C18.15 8.1 15.9 6 13 6c-.8 0-1.57.16-2.28.455"/></svg>
            ),
            Settings: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            ),
            Award: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
            ),
            X: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            ),
            Shield: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            )
        };

        let db = null;
        let auth = null;
        const appId = 'room-chore-manager-v2';

        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);
            const [firebaseInputConfig, setFirebaseInputConfig] = useState('');
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [syncError, setSyncError] = useState('');

            // Trạng thái cho Admin
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState('');
            const [logToDelete, setLogToDelete] = useState(null); // Lưu log muốn xoá
            const [confirmReset, setConfirmReset] = useState(false); // Xác nhận reset điểm

            const [members, setMembers] = useState([
                { id: 'tin', name: 'Tín', khacCount: 0, exemptTickets: 0 },
                { id: 'phuc', name: 'Phúc', khacCount: 0, exemptTickets: 0 },
                { id: 'ho', name: 'Hồ', khacCount: 0, exemptTickets: 0 },
                { id: 'phong', name: 'Phong', khacCount: 0, exemptTickets: 0 },
                { id: 'bao', name: 'Bảo', khacCount: 0, exemptTickets: 0 }
            ]);

            const [logs, setLogs] = useState([]);
            const [activeTaskForLog, setActiveTaskForLog] = useState(null);
            const [customOtherText, setCustomOtherText] = useState('');
            const [activeTab, setActiveTab] = useState('home');

            const tasks = [
                { id: 'do_rac', name: 'Đổ rác', icon: Icons.Trash, color: 'bg-rose-100 text-rose-800 dark:bg-rose-950 dark:text-rose-200' },
                { id: 'don_ve_sinh', name: 'Dọn nhà vệ sinh', icon: Icons.Sparkles, color: 'bg-purple-100 text-purple-800 dark:bg-purple-950 dark:text-purple-200' },
                { id: 'don_bep', name: 'Dọn bếp', icon: Icons.ChefHat, color: 'bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-200' },
                { id: 'khac', name: 'Việc Khác', icon: Icons.PlusCircle, color: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-200', hasSubtasks: true }
            ];

            const subTasks = [
                { id: 'do_rac_bon_rua', name: 'Đổ rác bồn rửa' },
                { id: 'khac_tuy_chinh', name: 'Khác (Tự ghi chú...)' }
            ];

            // Hàm lọc thông minh cấu hình Firebase từ đoạn text copy
            const extractFirebaseConfig = (rawString) => {
                try {
                    return JSON.parse(rawString);
                } catch (e) {
                    try {
                        const match = rawString.match(/\{[\s\S]*\}/);
                        if (match) {
                            const configObj = (new Function('return ' + match[0]))();
                            if (configObj.apiKey && configObj.projectId) {
                                return configObj;
                            }
                        }
                        throw new Error("Không tìm thấy cấu hình hợp lệ");
                    } catch (err) {
                        throw new Error("Mã không đúng định dạng cấu hình Firebase.");
                    }
                }
            };

            const initFirebaseWithConfig = async (config) => {
                try {
                    if (firebase.apps.length === 0) {
                        firebase.initializeApp(config);
                    } else {
                        await firebase.app().delete();
                        firebase.initializeApp(config);
                    }
                    
                    db = firebase.firestore();
                    auth = firebase.auth();

                    const cred = await auth.signInAnonymously();
                    setUser(cred.user);
                    setIsFirebaseConnected(true);
                    setSyncError('');
                    console.log("Firebase Connected: ", cred.user.uid);
                    
                } catch (e) {
                    console.error("Lỗi khởi động cấu hình Firebase:", e);
                    setIsFirebaseConnected(false);
                    if (e.code === 'auth/operation-not-allowed') {
                        setSyncError("Vui lòng vào Firebase Console -> Authentication -> Bật 'Anonymous' provider.");
                    } else {
                        setSyncError(e.message || "Không thể kết nối Firestore.");
                    }
                }
            };

            useEffect(() => {
                const savedConfig = localStorage.getItem('firebase_custom_config');
                if (savedConfig) {
                    try {
                        initFirebaseWithConfig(JSON.parse(savedConfig));
                    } catch (e) {
                        console.error("Lỗi load cấu hình cũ", e);
                    }
                } else {
                    const savedMembers = localStorage.getItem('chore_members_fixed');
                    const savedLogs = localStorage.getItem('chore_logs_fixed');
                    if (savedMembers) setMembers(JSON.parse(savedMembers));
                    if (savedLogs) setLogs(JSON.parse(savedLogs));
                }
            }, []);

            useEffect(() => {
                if (!isFirebaseConnected || !db) return;

                const unsubscribeMembers = db.collection('artifacts').doc(appId).collection('members')
                    .onSnapshot((snapshot) => {
                        const list = [];
                        snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) {
                            const order = ['tin', 'phuc', 'ho', 'phong', 'bao'];
                            const sortedList = [];
                            order.forEach(id => {
                                const found = list.find(m => m.id === id);
                                if (found) sortedList.push(found);
                            });
                            setMembers(sortedList.length > 0 ? sortedList : list);
                        } else {
                            members.forEach(m => {
                                db.collection('artifacts').doc(appId).collection('members').doc(m.id).set(m);
                            });
                        }
                    }, err => {
                        console.error("Lỗi quyền Firestore:", err);
                        setSyncError("Lỗi quyền truy cập! Vui lòng vào Firestore Database -> Rules -> Đổi thành 'allow read, write: if true;' để test.");
                        setIsFirebaseConnected(false);
                    });

                const unsubscribeLogs = db.collection('artifacts').doc(appId).collection('logs')
                    .onSnapshot((snapshot) => {
                        const list = [];
                        snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
                        list.sort((a, b) => b.timestamp - a.timestamp);
                        setLogs(list);
                    }, err => console.error(err));

                return () => {
                    unsubscribeMembers();
                    unsubscribeLogs();
                };
            }, [isFirebaseConnected]);

            // Tự động xóa lịch sử cũ hơn 30 ngày (Background task)
            useEffect(() => {
                if (!isFirebaseConnected || !db || logs.length === 0) return;

                const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000; // 30 ngày tính bằng milliseconds
                const now = Date.now();
                
                // Lọc ra các log có khoảng thời gian từ lúc tạo đến hiện tại > 30 ngày
                const oldLogs = logs.filter(log => (now - log.timestamp) > THIRTY_DAYS_MS);

                if (oldLogs.length > 0) {
                    const batch = db.batch();
                    oldLogs.forEach(log => {
                        batch.delete(db.collection('artifacts').doc(appId).collection('logs').doc(log.id));
                    });
                    batch.commit().then(() => {
                        console.log(`Đã tự động dọn dẹp ${oldLogs.length} lịch sử cũ hơn 30 ngày.`);
                    }).catch(console.error);
                }
            }, [logs, isFirebaseConnected]);

            const saveToLocalFallback = (newMembers, newLogs) => {
                if (!isFirebaseConnected) {
                    if (newMembers) {
                        setMembers(newMembers);
                        localStorage.setItem('chore_members_fixed', JSON.stringify(newMembers));
                    }
                    if (newLogs) {
                        setLogs(newLogs);
                        localStorage.setItem('chore_logs_fixed', JSON.stringify(newLogs));
                    }
                }
            };

            const handleLogTask = async (memberId, selectedSubTaskId = null) => {
                if (!activeTaskForLog) return;
                const member = members.find(m => m.id === memberId);
                if (!member) return;

                const now = new Date();
                const dateStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}`;

                let subTaskText = null;
                if (activeTaskForLog.id === 'khac') {
                    if (selectedSubTaskId === 'khac_tuy_chinh') {
                        subTaskText = customOtherText.trim() || 'Việc khác';
                    } else {
                        const sub = subTasks.find(s => s.id === selectedSubTaskId);
                        subTaskText = sub ? sub.name : 'Việc khác';
                    }
                }

                const newLog = {
                    id: Date.now().toString(),
                    taskId: activeTaskForLog.id,
                    taskName: activeTaskForLog.name,
                    subTaskId: selectedSubTaskId,
                    subTaskName: subTaskText,
                    memberId: member.id,
                    memberName: member.name,
                    date: dateStr,
                    timestamp: Date.now()
                };

                let updatedMembers = [...members];
                if (activeTaskForLog.id === 'khac') {
                    updatedMembers = members.map(m => {
                        if (m.id === member.id) {
                            const nextCount = (m.khacCount || 0) + 1;
                            const newTickets = (m.exemptTickets || 0) + (nextCount >= 5 ? 1 : 0);
                            return {
                                ...m,
                                khacCount: nextCount % 5,
                                exemptTickets: newTickets
                            };
                        }
                        return m;
                    });
                }

                if (activeTaskForLog.id === 'do_rac' && member.exemptTickets > 0) {
                    updatedMembers = updatedMembers.map(m => {
                        if (m.id === member.id) {
                            return { ...m, exemptTickets: Math.max(0, m.exemptTickets - 1) };
                        }
                        return m;
                    });
                    newLog.isExempted = true;
                }

                if (isFirebaseConnected && db) {
                    try {
                        const batch = db.batch();
                        batch.set(db.collection('artifacts').doc(appId).collection('logs').doc(newLog.id), newLog);
                        for (const m of updatedMembers) {
                            batch.set(db.collection('artifacts').doc(appId).collection('members').doc(m.id), m);
                        }
                        await batch.commit();
                    } catch (err) {
                        console.error("Lỗi khi ghi lên cloud", err);
                    }
                } else {
                    const updatedLogs = [newLog, ...logs];
                    saveToLocalFallback(updatedMembers, updatedLogs);
                }

                setActiveTaskForLog(null);
                setCustomOtherText('');
            };

            const handleManualFirebaseConfig = async () => {
                try {
                    setSyncError('');
                    const config = extractFirebaseConfig(firebaseInputConfig);
                    localStorage.setItem('firebase_custom_config', JSON.stringify(config));
                    await initFirebaseWithConfig(config);
                    
                    if (!syncError) {
                        setShowConfigModal(false);
                    }
                } catch (e) {
                    setSyncError(e.message || "Cấu hình không hợp lệ! Hãy copy nguyên đoạn code từ Firebase.");
                }
            };

            // Hàm đăng nhập Admin
            const handleAdminLogin = () => {
                if (adminPassword === 'phuc9') {
                    setIsAdmin(true);
                    setAdminPassword('');
                    setAdminError('');
                    setConfirmReset(false);
                } else {
                    setAdminError('Mật khẩu sai, vui lòng thử lại!');
                }
            };

            // Hàm Reset toàn bộ điểm (Khắc phục lỗi dữ liệu ảo bị kẹt)
            const executeResetPoints = async () => {
                if (isFirebaseConnected && db) {
                    try {
                        const batch = db.batch();
                        members.forEach(m => {
                            const ref = db.collection('artifacts').doc(appId).collection('members').doc(m.id);
                            batch.update(ref, { khacCount: 0, exemptTickets: 0 });
                        });
                        await batch.commit();
                    } catch (err) {
                        console.error("Lỗi reset", err);
                    }
                } else {
                    const resetMembers = members.map(m => ({ ...m, khacCount: 0, exemptTickets: 0 }));
                    setMembers(resetMembers);
                    localStorage.setItem('chore_members_fixed', JSON.stringify(resetMembers));
                }
                setConfirmReset(false);
                setShowAdminModal(false);
            };

            // Hàm thực thi xóa log
            const executeDeleteLog = async () => {
                if (!logToDelete) return;
                const log = logToDelete;

                // Khôi phục lại trạng thái của thành viên trước khi xoá (nếu có thể)
                let updatedMembers = [...members];
                const memberIndex = updatedMembers.findIndex(m => m.id === log.memberId);
                if (memberIndex !== -1) {
                    let m = { ...updatedMembers[memberIndex] };
                    if (log.taskId === 'khac') {
                        if (m.khacCount === 0) {
                            m.khacCount = 4;
                            m.exemptTickets = Math.max(0, (m.exemptTickets || 0) - 1);
                        } else {
                            m.khacCount -= 1;
                        }
                    } else if (log.taskId === 'do_rac' && log.isExempted) {
                        m.exemptTickets = (m.exemptTickets || 0) + 1;
                    }
                    updatedMembers[memberIndex] = m;
                }

                // Thực hiện xóa
                if (isFirebaseConnected && db) {
                    try {
                        const batch = db.batch();
                        batch.delete(db.collection('artifacts').doc(appId).collection('logs').doc(log.id));
                        if (memberIndex !== -1) {
                            batch.set(db.collection('artifacts').doc(appId).collection('members').doc(log.memberId), updatedMembers[memberIndex]);
                        }
                        await batch.commit();
                    } catch (err) {
                        console.error("Lỗi khi xóa trên cloud", err);
                    }
                } else {
                    const newLogs = logs.filter(l => l.id !== log.id);
                    setLogs(newLogs);
                    setMembers(updatedMembers);
                    localStorage.setItem('chore_logs_fixed', JSON.stringify(newLogs));
                    localStorage.setItem('chore_members_fixed', JSON.stringify(updatedMembers));
                }

                setLogToDelete(null); // Đóng modal xác nhận xóa
            };

            const getLogsForTask = (taskId) => logs.filter(log => log.taskId === taskId);
            const getLatestLogForTask = (taskId) => {
                const taskLogs = getLogsForTask(taskId);
                return taskLogs.length > 0 ? taskLogs[0] : null;
            };
            const getMemberStats = (memberId) => logs.filter(l => l.memberId === memberId).length;

            return (
                <div className="flex flex-col items-center min-h-screen">
                    
                    {/* Header */}
                    <header className="w-full max-w-md bg-white/70 dark:bg-neutral-800/70 backdrop-blur-md sticky top-0 z-30 px-6 py-4 flex items-center justify-between border-b border-neutral-200/50 dark:border-neutral-700/50 shadow-sm">
                        <div className="flex items-center space-x-2">
                            <div className="bg-emerald-600 p-2 rounded-2xl text-white shadow-md shadow-emerald-500/20 relative">
                                <Icons.Clock size={20} />
                                {isFirebaseConnected && (
                                    <span className="absolute -top-1 -right-1 w-3 h-3 bg-green-400 border-2 border-white rounded-full animate-pulse"></span>
                                )}
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight">Chấm Công Phòng</h1>
                                <p className="text-[11px] text-neutral-500 dark:text-neutral-400">

                                                </div>
                                            )}
                                        </div>

                                        <button 
                                            onClick={() => {
                                                setIsAdmin(false);
                                                setShowAdminModal(false);
                                            }}
                                            className="w-full bg-neutral-100 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-300 py-2.5 rounded-xl text-xs font-bold mt-2"
                                        >
                                            Đăng xuất Admin
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Modal cấu hình Firebase */}
                    {showConfigModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white dark:bg-neutral-800 w-full max-w-sm rounded-[32px] p-6 space-y-4 shadow-2xl">
                                <div className="flex items-center justify-between">
                                    <h3 className="font-bold text-base flex items-center space-x-2">
                                        <Icons.Settings />
                                        <span>Cấu hình Cloud Sync</span>
                                    </h3>
                                    <button 
                                        onClick={() => setShowConfigModal(false)}
                                        className="p-1 rounded-full bg-neutral-100 dark:bg-neutral-700"
                                    >
                                        <Icons.X />
                                    </button>
                                </div>

                                <p className="text-xs text-neutral-500 leading-relaxed">
                                    Hãy Copy toàn bộ đoạn text từ Firebase (bao gồm cả <code className="bg-neutral-200 dark:bg-neutral-700 px-1 rounded">const firebaseConfig = ...</code>) và dán vào đây. App sẽ tự động lọc thông tin cần thiết.
                                </p>

                                <textarea
                                    rows={6}
                                    placeholder='// Paste toàn bộ code Firebase SDK ở đây...'
                                    value={firebaseInputConfig}
                                    onChange={(e) => setFirebaseInputConfig(e.target.value)}
                                    className="w-full font-mono text-[10px] p-3 bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50"
                                />

                                <div className="flex space-x-2 pt-2">
                                    <button 
                                        onClick={() => setShowConfigModal(false)}
                                        className="flex-1 bg-neutral-100 dark:bg-neutral-700 py-2.5 rounded-xl text-xs font-semibold text-neutral-600 dark:text-neutral-300"
                                    >
                                        Đóng
                                    </button>
                                    <button 
                                        onClick={handleManualFirebaseConfig}
                                        className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-xs font-semibold shadow-md"
                                    >
                                        Lưu & Khởi Động
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 dark:bg-neutral-800/80 backdrop-blur-lg border-t border-neutral-200/50 dark:border-neutral-700/50 px-6 py-3 flex items-center justify-around z-40 rounded-t-3xl shadow-lg">
                        <button 
                            onClick={() => setActiveTab('home')}
                            className={`flex flex-col items-center space-y-1 transition-all duration-300 w-16 ${activeTab === 'home' ? 'text-emerald-600 dark:text-emerald-400 font-bold scale-105' : 'text-neutral-400'}`}
                        >
                            <div className={`p-1 px-4 rounded-full ${activeTab === 'home' ? 'bg-emerald-100 dark:bg-emerald-950/40' : ''}`}>
                                <Icons.Clock />
                            </div>
                            <span className="text-[10px]">Chấm công</span>
                        </button>

                        <button 
                            onClick={() => setActiveTab('history')}
                            className={`flex flex-col items-center space-y-1 transition-all duration-300 w-16 ${activeTab === 'history' ? 'text-emerald-600 dark:text-emerald-400 font-bold scale-105' : 'text-neutral-400'}`}
                        >
                            <div className={`p-1 px-4 rounded-full ${activeTab === 'history' ? 'bg-emerald-100 dark:bg-emerald-950/40' : ''}`}>
                                <Icons.History />
                            </div>
                            <span className="text-[10px]">Lịch sử</span>
                        </button>

                        {/* Nút Admin Navigation */}
                        <button 
                            onClick={() => setShowAdminModal(true)}
                            className={`flex flex-col items-center space-y-1 transition-all duration-300 w-16 ${isAdmin ? 'text-rose-500 font-bold scale-105' : 'text-neutral-400'}`}
                        >
                            <div className={`p-1 px-4 rounded-full ${isAdmin ? 'bg-rose-100 dark:bg-rose-950/40' : ''}`}>
                                <Icons.Shield />
                            </div>
                            <span className="text-[10px]">Admin</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
